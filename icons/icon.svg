<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf6e3"/>
      <stop offset="100%" stop-color="#f5e6c8"/>
    </linearGradient>
    <linearGradient id="star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d48a"/>
      <stop offset="100%" stop-color="#d4a853"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0d48a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#f0d48a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Фон со скруглёнными углами -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  
  <!-- Свечение вокруг главной звезды -->
  <circle cx="256" cy="256" r="140" fill="url(#glow)"/>
  
  <!-- Главная звезда (большая) -->
  <path d="M 256 130 L 276 220 L 366 240 L 276 260 L 256 350 L 236 260 L 146 240 L 236 220 Z" fill="url(#star)"/>
  
  <!-- Маленькие звёздочки вокруг -->
  <!-- Верхняя правая -->
  <path d="M 380 140 L 386 160 L 406 166 L 386 172 L 380 192 L 374 172 L 354 166 L 374 160 Z" fill="#d4a853" opacity="0.85"/>
  
  <!-- Верхняя левая (маленькая) -->
  <path d="M 180 160 L 184 174 L 198 178 L 184 182 L 180 196 L 176 182 L 162 178 L 176 174 Z" fill="#d4a853" opacity="0.7"/>
  
  <!-- Правая средняя -->
  <path d="M 410 220 L 414 232 L 426 236 L 414 240 L 410 252 L 406 240 L 394 236 L 406 232 Z" fill="#f0d48a" opacity="0.75"/>
  
  <!-- Нижняя левая (большая) -->
  <path d="M 170 320 L 178 348 L 206 356 L 178 364 L 170 392 L 162 364 L 134 356 L 162 348 Z" fill="#d4a853" opacity="0.9"/>
  
  <!-- Нижняя правая (средняя) -->
  <path d="M 360 340 L 366 360 L 386 366 L 366 372 L 360 392 L 354 372 L 334 366 L 354 360 Z" fill="#f0d48a" opacity="0.8"/>
  
  <!-- Левая средняя (маленькая) -->
  <path d="M 130 240 L 134 252 L 146 256 L 134 260 L 130 272 L 126 260 L 114 256 L 126 252 Z" fill="#d4a853" opacity="0.6"/>
  
  <!-- Верхняя центральная (очень маленькая) -->
  <path d="M 290 110 L 293 120 L 303 123 L 293 126 L 290 136 L 287 126 L 277 123 L 287 120 Z" fill="#f0d48a" opacity="0.65"/>
  
  <!-- Нижняя центральная (маленькая) -->
  <path d="M 230 400 L 234 412 L 246 416 L 234 420 L 230 432 L 226 420 L 214 416 L 226 412 Z" fill="#d4a853" opacity="0.7"/>
</svg>